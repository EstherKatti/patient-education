spring.application.name=patientEducation
google.client.id=
google.client.secret=
google.allowed.emails=
rate.limit.base-backoff-seconds=5
rate.limit.max-backoff-seconds=3600
spring.ai.google.genai.api-key=
spring.ai.google.genai.chat.model=gemini-2.5-flash
spring.ai.google.genai.chat.temperature=0.4
app.frontend-origin=${FRONTEND_ORIGIN}

# ===== Locked character (constant character across all scenes) =====
# Describes the uploaded reference: the young man in the blue t-shirt, Pixar style.
character.dna=a friendly young man in his twenties, short tousled black hair, thick dark eyebrows, warm light-tan skin, large expressive dark-brown eyes, clean-shaven with a rounded friendly face and a warm closed-mouth smile, wearing a plain royal-blue crew-neck t-shirt
character.style=3D Pixar-style render, soft three-point studio lighting with a gentle key light and subtle rim light, subtle subsurface scattering on the skin, plain solid light-grey background, no scenery, no props except the objects described, clean and cheerful, high detail, sharp focus
character.negative=duplicate person, cloned identical people, twins, split panels, grid, collage, comic strip, title bar, captions, numbers, icons, UI, progress bar, extra fingers, deformed hands, text, watermark, film grain, visible skin pores, photorealistic photo, mirrored duplicate, two copies of the same person, split body, reflection of the person

# ===== Images (free, no GPU) =====
image.gemini.model=gemini-2.5-flash-image
# optional: set 16:9 to generate natively wide; leave empty for the model\u2019s natural (square) framing
image.gemini.aspect-ratio=${GEMINI_IMAGE_ASPECT:}

# ===== FFmpeg (in-process render, no Node) =====
ffmpeg.bin=${FFMPEG_BIN:/Users/estherkatti/bin/ffmpeg}
# background beside non-16:9 images: auto = match the image\u2019s own grey edge; or set e.g. 0xD9D9D9
ffmpeg.pad-color=${FFMPEG_PAD_COLOR:auto}
# fit = whole image visible | cover = edge-to-edge (top-biased crop)
ffmpeg.fill-mode=${FFMPEG_FILL_MODE:fit}
ffmpeg.font=${FFMPEG_FONT:/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf}

# ===== Voice (constant: ONE Piper voice for every scene) =====
tts.piper.bin=${PIPER_BIN:/Users/estherkatti/Desktop/projects/patientEducation/piper/piper.sh}
tts.piper.voice.en=${PIPER_VOICE_EN:/Users/estherkatti/piper-voices/en_US-kusal-medium.onnx}
tts.piper.voice.hi=${PIPER_VOICE_HI:/Users/estherkatti/piper-voices/hi_IN-rohan-medium.onnx}
tts.piper.voice.ml=${PIPER_VOICE_ML:/Users/estherkatti/piper-voices/ml_IN-meera-medium.onnx}
tts.piper.voice.te=${PIPER_VOICE_TE:/Users/estherkatti/piper-voices/te_IN-padmavathi-medium.onnx}

# Tamil has no Piper voice -> Gemini TTS (paid, same key as image generation)
tts.gemini.model=gemini-2.5-flash-preview-tts
tts.gemini.voice=Kore
# burned captions only for languages the configured font can render (DejaVu = Latin only)
ffmpeg.caption-languages=${FFMPEG_CAPTION_LANGS:en}

# ===== Cast (fixed roles; each has a DNA + reference crop under resources/character/cast/) =====
cast.patient.dna=a friendly young man in his twenties, short tousled black hair, thick dark eyebrows, warm light-tan skin, wearing a plain royal-blue crew-neck t-shirt
cast.patient.reference=classpath:character/cast/patient.png
cast.caregiver.dna=a friendly young man in his twenties, short dark curly hair, warm light-tan skin, wearing a plain olive-green crew-neck t-shirt
cast.caregiver.reference=classpath:character/cast/caregiver.png
cast.doctor.dna=a friendly woman doctor in her thirties, dark hair in a low ponytail, glasses, wearing a white lab coat over a blue collared shirt
cast.doctor.reference=classpath:character/cast/doctor.png
cast.nurse.dna=a friendly woman nurse in her twenties, light-brown hair tied back, wearing light-blue scrubs
cast.nurse.reference=classpath:character/cast/nurse.png
ffmpeg.kenburns=${FFMPEG_KENBURNS:true}